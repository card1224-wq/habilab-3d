<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenthex Group | 젠텍스 홀딩스</title>
    <style>
        /* Import premium fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex; width: 100vw; height: 100vh; position: relative;
        }

        /* Nav Bar inside Portal */
        .corporate-nav {
            position: absolute; top: 0; width: 100%; padding: 30px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-sizing: border-box; pointer-events: none;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 4px; pointer-events: auto; }
        .nav-links a {
            color: rgba(255,255,255,0.6); text-decoration: none; margin-left: 30px;
            font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.3s; pointer-events: auto;
        }
        .nav-links a:hover { color: #fff; }

        /* Split Screen Modules */
        .split {
            flex: 1; position: relative; overflow: hidden; transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .split::before { /* Animated scanline overlay */
            content: ''; position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 51%);
            background-size: 100% 4px; pointer-events: none; opacity: 0.3;
        }

        .bg-overlay {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            filter: grayscale(80%) brightness(0.4);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); transform: scale(1.05);
            z-index: 0;
        }

        /* Background Graphics (Procedural CSS Gradients instead of broken images) */
        .left-side .bg-overlay {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        
        .right-side .bg-overlay {
            background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
        }

        .content {
            position: relative; z-index: 10; text-align: center; padding: 40px;
            opacity: 0.8; transition: all 0.5s ease;
        }

        .badge {
            display: inline-block; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 20px; backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0 0 20px 0;
            line-height: 1.1; font-weight: 400; font-style: italic;
        }

        h1 span {
            font-family: 'Outfit', sans-serif; font-weight: 800; font-style: normal;
        }

        p {
            font-size: 1.1rem; line-height: 1.6; color: #a1a1aa; max-width: 400px;
            margin: 0 auto 30px auto; font-weight: 300;
        }

        .features {
            display: flex; gap: 15px; justify-content: center; margin-bottom: 40px;
            opacity: 0; transform: translateY(20px); transition: all 0.5s ease;
        }

        .features span {
            font-size: 11px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #d4d4d8; font-weight: 600; letter-spacing: 1px;
        }

        .btn {
            display: inline-block; padding: 15px 40px; border-radius: 30px; text-decoration: none;
            font-weight: 600; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.3s; position: relative; overflow: hidden;
            opacity: 0; transform: translateY(20px); pointer-events: none;
        }

        .btn-studio { background-color: #fff; color: #000; }
        .btn-studio:hover { background-color: #f4f4f5; box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        
        .btn-finance { background-color: #00ffcc; color: #000; }
        .btn-finance:hover { box-shadow: 0 10px 30px rgba(0,255,204,0.3); }

        /* Hover Interactions */
        .split:hover { flex: 1.5; }
        .split:hover .bg-overlay { filter: grayscale(0%) brightness(0.7); transform: scale(1); }
        .split:hover .content { opacity: 1; transform: translateY(-10px); }
        .split:hover .features { opacity: 1; transform: translateY(0); transition-delay: 0.1s; }
        .split:hover .btn { opacity: 1; transform: translateY(0); transition-delay: 0.2s; pointer-events: auto; }

        /* Mobile Adjustment */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            h1 { font-size: 2.5rem; }
            .split { flex: 1 !important; }
            .btn, .features { opacity: 1; transform: translateY(0); pointer-events: auto; }
        }
    </style>
</head>
<body>
    <div class="corporate-nav">
        <div class="logo">ZENTHEX</div>
        <div class="nav-links">
            <a href="#">회사 소개</a>
            <a href="#">자회사</a>
            <a href="#">고객지원</a>
        </div>
    </div>

    <div class="container">
        <!-- Left Side: Zenthex Studio -->
        <div class="split left-side">
            <div class="bg-overlay"></div>
            <div class="content">
                <div class="badge">건축 & 3D 데모 솔루션</div>
                <h1>젠텍스 <span>스튜디오</span></h1>
                <p>AI 기반 공간 설계의 혁명. 단 한 장의 평면도만으로 세밀하게 렌더링 된 압도적인 3D 가상 공간을 브라우저에서 관람하세요.</p>
                <div class="features">
                    <span>브라우저 3D 렌더링</span>
                    <span>나노 바나나 감성</span>
                </div>
                <!-- 깃허브 배포용 상대경로 연결 -->
                <a href="studio.html" class="btn btn-studio">스튜디오 갤러리 입장</a>
            </div>
        </div>

        <!-- Right Side: Zenthex Finance -->
        <div class="split right-side">
            <div class="bg-overlay"></div>
            <div class="content">
                <div class="badge">모의 퀀트 트레이딩</div>
                <h1>젠텍스 <span>파이낸스</span></h1>
                <p>알고리즘 기반 초단타 트레이딩 시스템. 실제 거래소를 연동한 가상 자산 모의투자 백테스팅 관제소를 체험해보세요.</p>
                <div class="features">
                    <span>실시간 업비트 시세 연동</span>
                    <span>JS 자동매매 시뮬레이션</span>
                </div>
                <!-- 깃허브 배포용 상대경로 연결 -->
                <a href="finance.html" class="btn btn-finance">모의 터미널 가동</a>
            </div>
        </div>
    </div>
</body>
</html>

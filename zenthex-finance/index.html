<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenthex Finance - Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050507; color: #e5e7eb; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-text { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); }
        .neon-border { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        .input-dark:focus { border-color: #00ffcc; }
        
        /* Chart CSS */
        .chart-bar { background: linear-gradient(180deg, #00ffcc 0%, rgba(0,255,204,0.1) 100%); width: 25px; border-radius: 4px; margin: 0 5px; transition: height 0.5s ease; }
        .chart-bar.red { background: linear-gradient(180deg, #ff4d4d 0%, rgba(255,77,77,0.1) 100%); }
    </style>
</head>
<body class="p-6">
    
    <!-- Ecosystem Navigation -->
    <a href="http://localhost:8000" class="inline-flex items-center gap-2 text-gray-400 hover:text-white text-sm mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></svg>
        젠텍스 메인 포털로 돌아가기
    </a>

    <!-- Header -->
    <header class="flex justify-between items-center mb-8 glass-panel p-4 rounded-2xl">
        <div class="flex items-center gap-4">
            <h1 class="font-['Outfit'] text-2xl font-black tracking-widest uppercase">Zenthex <span class="neon-text">Finance</span></h1>
            <span class="px-3 py-1 text-[10px] font-bold bg-[#00ffcc]/10 text-[#00ffcc] rounded-full border border-[#00ffcc]/30">LIVE UPBIT API</span>
        </div>
        <div class="text-sm font-semibold text-gray-400 flex items-center">
            System: <span id="status-indicator" class="text-red-400 ml-2">● OFFLINE</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Panel -->
        <div class="col-span-1 flex flex-col gap-6">
            
            <!-- Upbit Identity Form -->
            <div class="glass-panel p-6 rounded-2xl">
                <h2 class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-4">개인 계좌 연동 (API KEY)</h2>
                <div class="mb-3">
                    <input type="password" id="access-key" class="input-dark text-xs" placeholder="Upbit Access Key (빈칸 시 모의투자)">
                </div>
                <div class="mb-4">
                    <input type="password" id="secret-key" class="input-dark text-xs" placeholder="Upbit Secret Key (빈칸 시 모의투자)">
                </div>
            </div>

            <!-- Bot Control Panel -->
            <div class="glass-panel p-6 rounded-2xl neon-border">
                <h2 class="text-xs text-[#00ffcc] font-bold uppercase tracking-widest mb-4">퀀트 봇 제어소 (Control)</h2>
                
                <div class="mb-4">
                    <p class="text-sm text-gray-400 mb-1">현재 총 자산 (추정치)</p>
                    <p class="text-4xl font-black text-white" id="display-balance">₩10,000</p>
                    <p class="text-[10px] mt-1 text-gray-500">초기 세팅: 1만원 (모의투자 기준)</p>
                </div>

                <div class="mb-4 mt-6">
                    <label class="text-xs text-gray-400 mb-2 block">목표 단타 수익률 (매도 기준)</label>
                    <select id="target-yield" class="input-dark p-3">
                        <option value="1.005">+0.5% (안정형)</option>
                        <option value="1.01" selected>+1.0% (스탠다드)</option>
                        <option value="1.02">+2.0% (공격형)</option>
                    </select>
                </div>
                
                <button id="btn-toggle" class="w-full py-4 mt-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold rounded-xl transition-all">
                    매매 엔진 가동 대기 (START)
                </button>
            </div>
        </div>

        <!-- Right Panel: Chart & Logs -->
        <div class="col-span-1 lg:col-span-2 flex flex-col gap-6">
            
            <!-- Chart Area -->
            <div class="glass-panel p-6 rounded-2xl flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs text-gray-500 font-bold uppercase tracking-widest">실시간 업비트 시세 (BTC/KRW)</h2>
                    <span class="text-sm font-black text-white" id="current-price">₩로딩중...</span>
                </div>
                
                <!-- Simple CSS Visualizer for price action -->
                <div class="flex-grow bg-black/50 rounded-xl border border-white/5 relative overflow-hidden flex items-end justify-around px-4 min-h-[300px]" id="chart-container">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
                    <!-- Bars injected by JS -->
                </div>
            </div>

            <!-- Terminal Log -->
            <div class="glass-panel p-4 rounded-2xl h-56 flex flex-col">
                <h2 class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3">알고리즘 매매 로그 (System Log)</h2>
                <div class="flex-grow bg-[#000000] rounded-xl p-4 font-mono text-[11px] overflow-y-auto border border-white/5 space-y-2" id="log-container">
                    <!-- Logs injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Frontend JS logic to connect to Python Backend -->
    <script>
        let isRunning = false;
        let priceHistory = [50, 50, 50, 50, 50, 50, 50, 50, 50, 50]; // Percentages 0-100
        let lastPrice = 0;

        const btnToggle = document.getElementById('btn-toggle');
        const statusIndicator = document.getElementById('status-indicator');
        const currentPriceEl = document.getElementById('current-price');
        const balanceEl = document.getElementById('display-balance');
        const logContainer = document.getElementById('log-container');
        const chartContainer = document.getElementById('chart-container');

        // Render Chart
        const renderChart = () => {
            const barsHTML = priceHistory.map((h, i) => {
                const isRed = i > 0 && priceHistory[i] < priceHistory[i-1];
                return `<div class="chart-bar ${isRed ? 'red' : ''}" style="height: ${h}%; z-index: 10;"></div>`;
            }).join('');
            // Keep background pattern
            chartContainer.innerHTML = `<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>` + barsHTML;
        };
        renderChart();

        // Control API
        btnToggle.addEventListener('click', async () => {
            if (!isRunning) {
                const accessKey = document.getElementById('access-key').value;
                const secretKey = document.getElementById('secret-key').value;
                const targetYield = parseFloat(document.getElementById('target-yield').value);
                
                await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accessKey, secretKey, targetYield })
                });
            } else {
                await fetch('/api/stop', { method: 'POST' });
            }
            fetchStatus(); // Immediately update UI
        });

        // Polling loop
        const fetchStatus = async () => {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                isRunning = data.isRunning;
                
                // Update UI Buttons
                if (isRunning) {
                    btnToggle.textContent = '매매 엔진 가동 중 (STOP)';
                    btnToggle.className = 'w-full py-4 mt-4 bg-[#00ffcc]/10 hover:bg-[#00ffcc]/20 border border-[#00ffcc] text-[#00ffcc] font-bold rounded-xl transition-all shadow-[0_0_15px_rgba(0,255,204,0.1)]';
                    statusIndicator.textContent = '● ONLINE';
                    statusIndicator.className = 'text-green-400 ml-2 animate-pulse';
                } else {
                    btnToggle.textContent = '매매 엔진 가동 대기 (START)';
                    btnToggle.className = 'w-full py-4 mt-4 bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold rounded-xl transition-all';
                    statusIndicator.textContent = '● OFFLINE';
                    statusIndicator.className = 'text-red-400 ml-2';
                }

                // Update text
                const currentStr = Math.floor(data.currentBtcPrice).toLocaleString();
                currentPriceEl.textContent = `₩${currentStr}`;
                balanceEl.textContent = `₩${Math.floor(data.estBalance).toLocaleString()}`;

                // Update mock chart logic
                if (lastPrice !== 0 && data.currentBtcPrice !== lastPrice) {
                    let move = (data.currentBtcPrice - lastPrice) / lastPrice;
                    let lastH = priceHistory[9];
                    let newH = Math.max(10, Math.min(90, lastH + (move * 100000))); // Amplify move for visual
                    priceHistory.shift();
                    priceHistory.push(newH);
                    renderChart();
                }
                lastPrice = data.currentBtcPrice;

                // Update Logs
                logContainer.innerHTML = data.logs.map(lg => {
                    let color = 'text-gray-400';
                    if(lg.includes('매수 체결')) color = 'text-blue-400 font-bold';
                    if(lg.includes('수익 실현')) color = 'text-[#00ffcc] font-bold bg-[#00ffcc]/10 inline-block px-1';
                    if(lg.includes('손절매')) color = 'text-red-400 font-bold bg-red-900/30 inline-block px-1';
                    if(lg.includes('시스템 대기')) color = 'text-gray-600';
                    return `<div class="${color}">${lg}</div>`;
                }).join('');
                logContainer.scrollTop = logContainer.scrollHeight;

            } catch(e) {
                console.error("Backend offline");
            }
        };

        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenthex Group</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="corporate-nav">
        <div class="logo">ZENTHEX</div>
        <div class="nav-links">
            <a href="#">회사 소개</a>
            <a href="#">자회사</a>
            <a href="#">고객지원</a>
        </div>
    </div>

    <!-- Background text -->
    <div class="bg-title">ZENTHEX GROUP</div>

    <div class="split-container">
        <!-- Left Side: Zenthex Studio -->
        <div class="split left-side">
            <div class="bg-overlay"></div>
            <div class="content">
                <div class="badge">건축 & 3D AI 솔루션</div>
                <h1>젠텍스 <span>스튜디오</span></h1>
                <p>AI 기반 공간 설계의 혁명. 단 한 장의 평면도만으로 세밀하게 렌더링 된 압도적인 3D 가상 공간을 실시간으로 구축합니다.</p>
                <div class="features">
                    <span>구글 제미나이 AI 연동</span>
                    <span>완벽한 나노 바나나 감성</span>
                </div>
                <a href="http://localhost:8081" target="_blank" class="btn btn-studio">스튜디오 입장</a>
            </div>
        </div>

        <!-- Right Side: Zenthex Finance -->
        <div class="split right-side">
            <div class="bg-overlay"></div>
            <div class="content">
                <div class="badge">퀀트 기반 자동 매매</div>
                <h1>젠텍스 <span>파이낸스</span></h1>
                <p>개인 자산 증식을 위한 고빈도 알고리즘 트레이딩 시스템. 암호화폐 시장의 초단기 변동성을 분석하여 수익을 극대화합니다.</p>
                <div class="features">
                    <span>전담 스캘핑(단타) 봇</span>
                    <span>실시간 시세 분석 관제소</span>
                </div>
                <!-- 링크를 8082 포트(코인 봇 서버)로 변경 -->
                <a href="http://localhost:8082" target="_blank" class="btn btn-finance">트레이딩 터미널 가동</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
